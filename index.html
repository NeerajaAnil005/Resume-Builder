<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; font-family:'Inter',sans-serif; margin:0; padding:0; }

  body {
    background: linear-gradient(135deg,#e0eaff,#fdfcff);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:50px;
    min-height:100vh;
  }

  /* Container with equal height */
  .container {
    display:flex;
    gap:40px;
    max-width:1200px;
    width:100%;
    align-items: stretch; /* ensures form and preview are same height */
  }

  @media(max-width:900px){
    .container{ 
      flex-direction:column; 
      gap:30px; 
    }
  }

  /* Form */
  form {
    flex:1; 
    display:flex;
    flex-direction:column;
    background:#fff; 
    padding:30px; 
    border-radius:20px; 
    box-shadow:0 15px 35px rgba(0,0,0,0.12); 
    transition: transform 0.3s;
    max-height: 80vh; 
    overflow-y:auto; /* scroll if content is long */
  }
  form:hover { transform: translateY(-5px); }
  form h2 {
    font-size:2rem; font-weight:700; color:#1e293b; margin-bottom:15px; text-align:center; letter-spacing:1px;
  }

  label { font-weight:600; color:#1e293b; margin-bottom:5px; display:block; font-size:0.95rem; }
  input, textarea { width:100%; padding:14px 18px; border-radius:12px; border:1px solid #cbd5e1; font-size:1rem; outline:none; background:#f8fafc; transition:border-color 0.3s, box-shadow 0.3s; }
  input:focus, textarea:focus { border-color:#6366f1; box-shadow:0 0 12px rgba(99,102,241,0.25); }
  textarea { resize:vertical; min-height:80px; }

  /* Preview */
  .preview {
    flex:1; 
    display:flex;
    flex-direction:column;
    background:#fff; 
    border-radius:20px; 
    padding:30px; 
    box-shadow:0 15px 35px rgba(0,0,0,0.12); 
    transition: transform 0.3s;
    max-height: 80vh; 
    overflow-y:auto; /* scroll if content is long */
  }
  .preview:hover { transform: translateY(-5px); }

  .preview-section { margin-bottom:25px; }
  .preview-section h3 { font-size:1.25rem; font-weight:700; color:#1e293b; margin-bottom:8px; border-bottom:2px solid #e0e7ff; display:inline-block; padding-bottom:2px; }
  .preview-section p { color:#374151; line-height:1.5; background:#f0f4ff; padding:10px 12px; border-radius:10px; min-height:40px; }

  /* Skills section styled like other sections */
  #preview-skills {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding:10px 12px;       /* match other sections */
    background:#f0f4ff;      /* same background as other columns */
    border-radius:10px;
    min-height:40px;
  }
  #preview-skills span {
    background:linear-gradient(90deg,#2563eb,#3b82f6);
    color:white;
    padding:5px 10px;
    border-radius:12px;
    font-size:0.85rem;
    font-weight:500;
  }

  /* Buttons outside container */
  .action-buttons {
    display:flex;
    gap:20px;
    margin-top:30px;
    max-width:1200px;
    width:100%;
    justify-content:center;
  }
  .action-buttons button {
    padding:12px 25px; border:none; border-radius:12px; font-weight:600; cursor:pointer; transition:0.3s; font-size:1rem; flex:1; max-width:200px;
  }
  #ai-btn { background:linear-gradient(90deg,#7c3aed,#a855f7); color:white; }
  #ai-btn:hover { background:linear-gradient(90deg,#5b21b6,#9333ea); }
  #download-btn { background:linear-gradient(90deg,#2563eb,#3b82f6); color:white; }
  #download-btn:hover { background:linear-gradient(90deg,#1e40af,#2563eb); }

</style>
</head>
<body>
  <div class="container">
    <form id="resume-form">
      <h2>Resume Builder</h2>
      <div><label for="name">Name</label><input type="text" id="name" placeholder="John Doe"></div>
      <div><label for="email">Email</label><input type="email" id="email" placeholder="john@example.com"></div>
      <div><label for="skills">Skills</label><textarea id="skills" placeholder="HTML, CSS, JavaScript..."></textarea></div>
      <div><label for="experience">Experience</label><textarea id="experience" placeholder="Describe your work experience..."></textarea></div>
      <div><label for="education">Education</label><textarea id="education" placeholder="University, Degree, Year..."></textarea></div>
      <div><label for="projects">Projects</label><textarea id="projects" placeholder="Project Name - Description..."></textarea></div>
      <div><label for="certifications">Certifications</label><textarea id="certifications" placeholder="Certification Name - Year..."></textarea></div>
    </form>

    <div class="preview" id="preview">
      <div class="preview-section"><h3 id="preview-name">John Doe</h3><p id="preview-email">john@example.com</p></div>
      <div class="preview-section"><h3>Skills</h3><p id="preview-skills"></p></div>
      <div class="preview-section"><h3>Experience</h3><p id="preview-experience">Describe your work experience...</p></div>
      <div class="preview-section"><h3>Education</h3><p id="preview-education">University, Degree, Year...</p></div>
      <div class="preview-section"><h3>Projects</h3><p id="preview-projects">Project Name - Description...</p></div>
      <div class="preview-section"><h3>Certifications</h3><p id="preview-certifications">Certification Name - Year...</p></div>
    </div>
  </div>

  <!-- Buttons outside container -->
  <div class="action-buttons">
    <button type="button" id="ai-btn">AI Suggestions</button>
    <button type="button" id="download-btn">Download PDF</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script>
    const fields = ['name','email','skills','experience','education','projects','certifications'];
    fields.forEach(id => {
      const input = document.getElementById(id);
      const preview = document.getElementById('preview-' + id);
      input.addEventListener('input', () => {
        if(id==='skills'){
          preview.innerHTML = input.value.split(',').map(skill => `<span>${skill.trim()}</span>`).join('');
        } else {
          preview.textContent = input.value || preview.textContent;
        }
      });
    });

    // AI Suggestions
    document.getElementById('ai-btn').addEventListener('click', () => {
      document.getElementById('skills').value = "HTML, CSS, JavaScript, React, Node.js";
      document.getElementById('experience').value = "Front-end developer building responsive web apps.";
      document.getElementById('education').value = "XYZ University - B.Tech Computer Science - 2024";
      document.getElementById('projects').value = "Portfolio Website - Built with React.";
      document.getElementById('certifications').value = "Full Stack Web Dev - Coursera - 2023";

      const skillsPreview = document.getElementById('preview-skills');
      skillsPreview.innerHTML = document.getElementById('skills').value.split(',').map(s=>`<span>${s.trim()}</span>`).join('');
      ['experience','education','projects','certifications'].forEach(id => {
        document.getElementById('preview-'+id).textContent = document.getElementById(id).value;
      });
    });

    // Download PDF
    
document.getElementById('download-btn').addEventListener('click', () => {

  const element = document.getElementById('preview');

  // Store original styles
  const originalMaxHeight = element.style.maxHeight;
  const originalOverflow = element.style.overflow;

  // Remove height restriction for full capture
  element.style.maxHeight = "none";
  element.style.overflow = "visible";

  const opt = {
    margin: 0.5,
    filename: 'My_Resume.pdf',
    image: { type: 'jpeg', quality: 1 },
    html2canvas: { 
      scale: 3,
      useCORS: true
    },
    jsPDF: { 
      unit: 'in', 
      format: 'a4', 
      orientation: 'portrait' 
    },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
  };

  html2pdf().set(opt).from(element).save().then(() => {

    // Restore original styles after PDF generation
    element.style.maxHeight = originalMaxHeight;
    element.style.overflow = originalOverflow;

  });

});
</script>
</body>
</html>
